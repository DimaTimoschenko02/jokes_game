<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PunchMe Admin</title>
<style>
  :root { font-family: 'Segoe UI', system-ui, sans-serif; color: #1c1e21; background: #f0f2f5; }
  * { box-sizing: border-box; margin: 0; }
  body { min-height: 100vh; padding: 24px; }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 16px; color: #111; }
  h2 { font-size: 18px; margin: 16px 0 8px; color: #222; }

  /* Login */
  .login-box { max-width: 320px; margin: 120px auto; display: grid; gap: 12px; background: #fff; padding: 28px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  .login-box input, .login-box button { padding: 10px 14px; border-radius: 8px; border: 1px solid #d0d5dd; background: #f9fafb; color: #1c1e21; font-size: 14px; }
  .login-box input:focus { outline: 2px solid #4f6ef7; border-color: transparent; }
  .login-box button { background: #4f6ef7; border-color: transparent; color: #fff; cursor: pointer; font-weight: 600; }
  .login-box button:hover { background: #3b5bdb; }
  .login-error { color: #e03131; font-size: 13px; }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .toolbar select, .toolbar input { padding: 6px 10px; border-radius: 6px; border: 1px solid #d0d5dd; background: #fff; color: #1c1e21; font-size: 13px; }
  .toolbar input { flex: 1; min-width: 140px; }
  .toolbar button { padding: 6px 14px; border-radius: 6px; border: 1px solid #d0d5dd; background: #fff; color: #1c1e21; cursor: pointer; font-size: 13px; font-weight: 500; }
  .toolbar button:hover { background: #e9ecef; }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e9ecef; }
  th { color: #555; font-weight: 700; cursor: pointer; user-select: none; white-space: nowrap; background: #f8f9fa; }
  th:hover { color: #111; }
  th .arrow { font-size: 10px; margin-left: 4px; }
  tr:hover { background: #f1f3ff; }
  .text-cell { max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .actions { white-space: nowrap; }
  .actions button { padding: 4px 10px; border-radius: 6px; border: 1px solid #d0d5dd; background: #fff; color: #333; cursor: pointer; font-size: 12px; margin-right: 4px; font-weight: 500; }
  .actions button:hover { background: #e9ecef; }
  .actions button.danger { border-color: #fca5a5; color: #dc2626; background: #fff5f5; }
  .actions button.danger:hover { background: #fee2e2; }

  /* Pagination */
  .pagination { display: flex; gap: 6px; align-items: center; margin-top: 12px; font-size: 13px; color: #666; }
  .pagination button { padding: 5px 12px; border-radius: 6px; border: 1px solid #d0d5dd; background: #fff; color: #333; cursor: pointer; font-size: 12px; font-weight: 500; }
  .pagination button:hover { background: #e9ecef; }
  .pagination button:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Completions panel */
  .completions-row td { padding: 0; }
  .completions-panel { padding: 14px 18px; background: #f8f9ff; border-left: 3px solid #4f6ef7; }
  .completions-panel table { margin-top: 8px; box-shadow: none; background: transparent; }
  .completions-panel th { color: #777; background: transparent; }
  .completions-panel td { border-bottom-color: #e2e5f0; }
  .completion-punchline { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .no-completions { color: #999; font-style: italic; padding: 8px 0; }

  /* Edit modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: #fff; border: 1px solid #d0d5dd; border-radius: 12px; padding: 24px; width: min(480px, 90vw); display: grid; gap: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
  .modal input, .modal textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #d0d5dd; background: #f9fafb; color: #1c1e21; font: inherit; font-size: 14px; }
  .modal textarea { min-height: 80px; resize: vertical; }
  .modal input:focus, .modal textarea:focus { outline: 2px solid #4f6ef7; border-color: transparent; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button { padding: 8px 18px; border-radius: 8px; border: 1px solid #d0d5dd; cursor: pointer; font-size: 13px; font-weight: 600; }
  .modal-actions .save { background: #4f6ef7; border-color: transparent; color: #fff; }
  .modal-actions .save:hover { background: #3b5bdb; }
  .modal-actions .cancel { background: #fff; color: #333; }
  .modal-actions .cancel:hover { background: #f1f3f5; }

  .hidden { display: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-human { background: #dbeafe; color: #1d4ed8; }
  .badge-bot { background: #fee2e2; color: #dc2626; }
</style>
</head>
<body>

<div id="loginView" class="login-box">
  <h1>PunchMe Admin</h1>
  <input id="passwordInput" type="password" placeholder="Пароль..." autofocus>
  <button onclick="doLogin()">Войти</button>
  <div id="loginError" class="login-error hidden"></div>
</div>

<div id="mainView" class="container hidden">
  <h1>PunchMe Admin</h1>

  <div class="toolbar">
    <select id="sortSelect">
      <option value="createdAt">По дате</option>
      <option value="usedCount">По использованиям</option>
      <option value="completionsCount">По кол-ву окончаний</option>
      <option value="text">По тексту</option>
    </select>
    <select id="orderSelect">
      <option value="desc">Убыв.</option>
      <option value="asc">Возр.</option>
    </select>
    <select id="limitSelect">
      <option value="20">20</option>
      <option value="50">50</option>
      <option value="100">100</option>
    </select>
    <button onclick="loadPrompts()">Обновить</button>
    <button onclick="doLogout()">Выйти</button>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="setSort('text')">Текст промпта <span class="arrow" id="arrow-text"></span></th>
        <th onclick="setSort('usedCount')" class="num">Исп. <span class="arrow" id="arrow-usedCount"></span></th>
        <th onclick="setSort('completionsCount')" class="num">Оконч. <span class="arrow" id="arrow-completionsCount"></span></th>
        <th class="num">Ср. рейт.</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="promptsBody"></tbody>
  </table>

  <div class="pagination">
    <button id="prevBtn" onclick="changePage(-1)">Назад</button>
    <span id="pageInfo"></span>
    <button id="nextBtn" onclick="changePage(1)">Вперёд</button>
  </div>
</div>

<div id="editModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Редактирование промпта</h2>
    <textarea id="editText"></textarea>
    <div class="modal-actions">
      <button class="cancel" onclick="closeModal()">Отмена</button>
      <button class="save" onclick="saveEdit()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const API = '/api/admin';
let token = localStorage.getItem('admin_token') || '';
let currentPage = 1;
let totalPages = 1;
let editingId = null;
let expandedId = null;

// Init
if (token) {
  showMain();
  loadPrompts();
} else {
  document.getElementById('loginView').classList.remove('hidden');
}
document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) { doLogout(); return null; }
  return res.json();
}

async function doLogin() {
  const pw = document.getElementById('passwordInput').value;
  const data = await api('/login', { method: 'POST', body: JSON.stringify({ password: pw }) });
  if (data && data.token) {
    token = data.token;
    localStorage.setItem('admin_token', token);
    showMain();
    loadPrompts();
  } else {
    document.getElementById('loginError').textContent = 'Неверный пароль';
    document.getElementById('loginError').classList.remove('hidden');
  }
}

function doLogout() {
  token = '';
  localStorage.removeItem('admin_token');
  location.reload();
}

function showMain() {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('mainView').classList.remove('hidden');
}

async function loadPrompts() {
  const sort = document.getElementById('sortSelect').value;
  const order = document.getElementById('orderSelect').value;
  const limit = document.getElementById('limitSelect').value;
  const data = await api(`/prompts?page=${currentPage}&limit=${limit}&sort=${sort}&order=${order}`);
  if (!data) return;
  totalPages = Math.max(1, Math.ceil(data.total / data.limit));
  updateArrows(sort, order);
  renderTable(data.items);
  document.getElementById('pageInfo').textContent = `${data.page} / ${totalPages} (${data.total} всего)`;
  document.getElementById('prevBtn').disabled = data.page <= 1;
  document.getElementById('nextBtn').disabled = data.page >= totalPages;
}

function renderTable(items) {
  const tbody = document.getElementById('promptsBody');
  tbody.innerHTML = '';
  items.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="text-cell" title="${esc(item.text)}">${esc(item.text)}</td>
      <td class="num">${item.usedCount}</td>
      <td class="num">${item.completionsCount}</td>
      <td class="num">${item.avgVoteShare != null ? (item.avgVoteShare * 100).toFixed(0) + '%' : '—'}</td>
      <td class="actions">
        <button onclick="toggleCompletions('${item._id}', this)">Окончания</button>
        <button onclick="openEdit('${item._id}', ${JSON.stringify(JSON.stringify(item.text))})">Ред.</button>
        <button class="danger" onclick="deletePrompt('${item._id}')">Удалить</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

async function toggleCompletions(id, btn) {
  const existing = document.getElementById('comp-' + id);
  if (existing) { existing.remove(); expandedId = null; return; }
  // Close other
  if (expandedId) { const old = document.getElementById('comp-' + expandedId); if (old) old.remove(); }
  expandedId = id;

  const data = await api('/prompts/' + id);
  if (!data || data.error) return;

  const row = btn.closest('tr');
  const compRow = document.createElement('tr');
  compRow.id = 'comp-' + id;
  compRow.className = 'completions-row';

  if (!data.completions || data.completions.length === 0) {
    compRow.innerHTML = `<td colspan="5"><div class="completions-panel"><div class="no-completions">Нет окончаний</div></div></td>`;
  } else {
    let html = `<td colspan="5"><div class="completions-panel"><h2>Окончания (${data.completions.length})</h2><table><thead><tr>
      <th>Панчлайн</th><th>Кто</th><th class="num">Голоса</th><th class="num">Рейтинг</th><th class="num">Доля</th><th>Комната</th><th></th>
    </tr></thead><tbody>`;
    data.completions.forEach((c, i) => {
      const badge = c.source === 'bot' ? '<span class="badge badge-bot">бот</span>' : '<span class="badge badge-human">человек</span>';
      const rating = c.ratingAverage != null ? c.ratingAverage.toFixed(1) : '—';
      const share = (c.voteShare * 100).toFixed(0) + '%';
      html += `<tr>
        <td class="completion-punchline" title="${esc(c.punchline)}">${esc(c.punchline)}</td>
        <td>${badge}</td>
        <td class="num">${c.votesFor}/${c.votesFor + c.votesAgainst}</td>
        <td class="num">${rating}</td>
        <td class="num">${share}</td>
        <td>${c.roomCode || '—'}</td>
        <td class="actions"><button class="danger" onclick="deleteCompletion('${id}', ${i})">Удалить</button></td>
      </tr>`;
    });
    html += '</tbody></table></div></td>';
    compRow.innerHTML = html;
  }
  row.after(compRow);
}

function setSort(field) {
  const sel = document.getElementById('sortSelect');
  const ord = document.getElementById('orderSelect');
  if (sel.value === field) {
    ord.value = ord.value === 'desc' ? 'asc' : 'desc';
  } else {
    sel.value = field;
    ord.value = 'desc';
  }
  currentPage = 1;
  loadPrompts();
}

function updateArrows(sort, order) {
  ['text', 'usedCount', 'completionsCount'].forEach(f => {
    const el = document.getElementById('arrow-' + f);
    if (el) el.textContent = sort === f ? (order === 'asc' ? '\u25B2' : '\u25BC') : '';
  });
}

function changePage(delta) {
  currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
  loadPrompts();
}

function openEdit(id, text) {
  editingId = id;
  document.getElementById('editText').value = text;
  document.getElementById('editModal').classList.remove('hidden');
  document.getElementById('editText').focus();
}

function closeModal() {
  document.getElementById('editModal').classList.add('hidden');
  editingId = null;
}

async function saveEdit() {
  if (!editingId) return;
  const text = document.getElementById('editText').value.trim();
  if (!text) return;
  await api('/prompts/' + editingId, { method: 'PATCH', body: JSON.stringify({ text }) });
  closeModal();
  loadPrompts();
}

async function deletePrompt(id) {
  if (!confirm('Удалить промпт со всеми окончаниями?')) return;
  await api('/prompts/' + id, { method: 'DELETE' });
  loadPrompts();
}

async function deleteCompletion(promptId, index) {
  if (!confirm('Удалить это окончание?')) return;
  await api(`/prompts/${promptId}/completions/${index}`, { method: 'DELETE' });
  // Refresh completions
  const compRow = document.getElementById('comp-' + promptId);
  if (compRow) compRow.remove();
  expandedId = null;
  loadPrompts();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
