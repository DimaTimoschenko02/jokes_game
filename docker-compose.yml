services:
  # ── Infrastructure (always needed) ──────────────────────────────
  mongo:
    image: mongo:7
    container_name: punchme-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - punchme-mongo-data:/data/db

  ollama:
    image: ollama/ollama:latest
    container_name: punchme-ollama
    ports:
      - '11434:11434'
    volumes:
      - punchme-ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 15s
      retries: 12
      start_period: 90s

  model-pull:
    image: curlimages/curl:8.10.1
    container_name: punchme-model-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - >
        curl -sS -X POST http://ollama:11434/api/pull
        -H "Content-Type: application/json"
        -d '{"model":"bge-m3"}'
    profiles:
      - setup

  # ── App containers (production/Docker mode) ─────────────────────
  api:
    build:
      context: ./api
    container_name: punchme-api
    environment:
      PORT: 4000
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBED_MODEL: bge-m3
      MONGO_URI: mongodb://mongo:27017/punchme
    ports:
      - '4000:4000'
    depends_on:
      mongo:
        condition: service_started
      ollama:
        condition: service_healthy
    profiles:
      - production

  web:
    build:
      context: ./web
    container_name: punchme-web
    environment:
      VITE_SOCKET_PROXY_TARGET: http://api:4000
    ports:
      - '5173:5173'
    depends_on:
      - api
    profiles:
      - production

  ngrok:
    image: ngrok/ngrok:latest
    container_name: punchme-ngrok
    command:
      - http
      - web:5173
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - '4040:4040'
    depends_on:
      - web
    profiles:
      - tunnel

volumes:
  punchme-mongo-data:
  punchme-ollama-data:
